services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: investwise
      POSTGRES_PASSWORD: investwise
      POSTGRES_DB: investwise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://investwise:investwise@db:5432/investwise
      FRONTEND_ORIGIN: http://localhost:5173
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
